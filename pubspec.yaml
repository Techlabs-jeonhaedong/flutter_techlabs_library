name: flutter_techlabs_library
description: Techlabs 서비스 점검/버전체크/공지 라이브러리의 Flutter 브릿지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.techlabs.flutter.flutter_techlabs_library
        pluginClass: FlutterTechlabsLibraryPlugin
      ios:
        pluginClass: FlutterTechlabsLibraryPlugin
